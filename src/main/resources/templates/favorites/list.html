<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Sevimlilar | Oldi-Berdi</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --p: #d1007a; --bg: #f8f9fa; --gray: #8e8e93; --text-dark: #1c1c1e; --border-light: #f0f0f2; --card-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        .navbar {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(16px);
            padding: 10px 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--p), #7b1fa2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-icons { display: flex; gap: 18px; }
        .nav-icon { text-decoration: none; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; font-size: 13px; gap: 4px; }
        .nav-icon i { font-size: 22px; }
        .container { max-width: 1280px; margin: 32px auto; padding: 0 24px; }
        .page-header { margin-bottom: 32px; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .ad-card {
            background: var(--card-white);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .ad-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 14px 12px 16px; }
        .card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .price { font-size: 18px; font-weight: 800; color: var(--p); margin-bottom: 6px; }
        .card-meta { font-size: 12px; color: var(--gray); display: flex; gap: 8px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 60px; color: var(--gray); grid-column: 1/-1; }
        .footer { text-align: center; padding: 24px; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--gray); }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/ads" class="logo">Oldi<span>-Berdi</span></a>
    <div class="nav-icons">
        <a href="/ads/create" class="nav-icon"><i class="bi bi-plus-circle"></i><span>Sotish</span></a>
        <a href="/favorites" class="nav-icon"><i class="bi bi-heart"></i><span>Sevimlilar</span></a>
        <div sec:authorize="isAnonymous()">
            <a href="/login" class="nav-icon"><i class="bi bi-person"></i><span>Kirish</span></a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <a href="/profile" class="nav-icon"><i class="bi bi-person-circle"></i><span>Profil</span></a>
        </div>
    </div>
</nav>
<div class="container">
    <div class="page-header"><h1><i class="bi bi-heart-fill" style="color: var(--p);"></i> Sevimlilar</h1></div>
    <div id="favoritesGrid" class="ads-grid">Yuklanmoqda...</div>
</div>
<div class="footer">© 2025 Oldi-Berdi – Ishonchli savdo maydoni</div>

<script>
    (function() {
        const container = document.getElementById('favoritesGrid');
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');

        // 1. Avval login holatini aniqlaymiz
        fetch('/api/ads/my', { headers: { 'Accept': 'application/json' } })
            .then(res => {
                if (res.status === 200) {
                    // Login qilgan
                    document.getElementById('loginLink').style.display = 'none';
                    document.getElementById('profileLink').style.display = 'flex';
                    return res.json().then(ads => ({ isLoggedIn: true, ads }));
                } else {
                    // Anonim
                    document.getElementById('loginLink').style.display = 'flex';
                    document.getElementById('profileLink').style.display = 'none';
                    return { isLoggedIn: false, ads: [] };
                }
            })
            .then(({ isLoggedIn, ads }) => {
                if (isLoggedIn) {
                    renderAds(ads);
                } else {
                    // Anonim: localStorage dan o‘qib, POST /api/ads/by-ids
                    let ids = [];
                    try {
                        const stored = localStorage.getItem('favorites');
                        if (stored) ids = JSON.parse(stored);
                    } catch(e) { ids = []; }
                    if (ids.length === 0) {
                        renderAds([]);
                    } else {
                        fetch('/api/ads/by-ids', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRF-TOKEN': csrfToken
                            },
                            body: JSON.stringify(ids)
                        })
                            .then(res => res.ok ? res.json() : [])
                            .then(ads => renderAds(ads))
                            .catch(err => {
                                console.error(err);
                                renderAds([]);
                            });
                    }
                }
            })
            .catch(err => {
                // Xatolik bo‘lsa, anonim deb ishlaymiz
                console.warn(err);
                let ids = [];
                try { ids = JSON.parse(localStorage.getItem('favorites') || '[]'); } catch(e) {}
                if (ids.length) {
                    fetch('/api/ads/by-ids', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfToken },
                        body: JSON.stringify(ids)
                    })
                        .then(res => res.ok ? res.json() : [])
                        .then(ads => renderAds(ads))
                        .catch(() => renderAds([]));
                } else {
                    renderAds([]);
                }
            });

        function renderAds(ads) {
            if (!ads || ads.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="bi bi-heart" style="font-size: 48px;"></i>
                    <p>Sevimlilar ro‘yxati bo‘sh</p>
                    <a href="/ads" style="color: var(--p);">E’lonlarni ko‘rish</a>
                </div>`;
                return;
            }
            let html = '';
            ads.forEach(ad => {
                const img = ad.imageUrl ? `/uploads/${ad.imageUrl}` : 'https://placehold.co/600x400/f5f5f7/8e8e93?text=Rasm+yo‘q';
                html += `
                    <a href="/ads/${ad.id}" class="ad-card">
                        <img class="card-img" src="${img}" alt="Rasm">
                        <div class="card-content">
                            <h3 class="card-title">${escapeHtml(ad.title)}</h3>
                            <div class="price">${formatNumber(ad.price)} so‘m</div>
                            <div class="card-meta">
                                <span><i class="bi bi-tag"></i> ${escapeHtml(ad.categoryName)}</span>
                                <span><i class="bi bi-geo-alt"></i> ${escapeHtml(ad.locationName)}</span>
                                <span><i class="bi bi-calendar3"></i> ${ad.createdAt || ''}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        function formatNumber(n) { return new Intl.NumberFormat('uz-UZ').format(n); }
    })();
</script>
</body>
</html>
