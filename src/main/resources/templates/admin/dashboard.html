<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Oldi-Berdi</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --p: #d1007a;
      --bg: #f8f9fa;
      --gray: #8e8e93;
      --text-dark: #1c1c1e;
      --border-light: #f0f0f2;
      --card-white: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); }
    .navbar {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      padding: 10px 8%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--p), #7b1fa2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-icons { display: flex; gap: 18px; }
    .nav-icon { text-decoration: none; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; font-size: 13px; gap: 4px; }
    .nav-icon i { font-size: 22px; }
    .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
    .dashboard-card {
      background: var(--card-white);
      border-radius: 28px;
      border: 1px solid var(--border-light);
      padding: 28px;
      margin-bottom: 28px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .stat-card {
      background: var(--bg);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border-light);
      transition: 0.2s;
      text-decoration: none;
      color: var(--text-dark);
      display: block;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      border-color: var(--p-light);
    }
    .stat-number {
      font-size: 36px;
      font-weight: 800;
      color: var(--p);
    }
    .stat-label {
      font-size: 14px;
      color: var(--gray);
      margin-top: 8px;
    }
    .admin-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .admin-link {
      background: var(--bg);
      border-radius: 20px;
      padding: 16px 24px;
      text-decoration: none;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      border: 1px solid var(--border-light);
      transition: 0.2s;
    }
    .admin-link i { font-size: 24px; color: var(--p); }
    .admin-link:hover {
      background: var(--card-white);
      border-color: var(--p);
    }
    .footer { text-align: center; padding: 24px; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--gray); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="logo">Oldi<span>-Berdi</span> Admin</a>
  <div class="nav-icons">
    <a href="/ads" class="nav-icon"><i class="bi bi-house"></i><span>Saytga o‘tish</span></a>
    <form th:action="@{/auth/logout}" method="post" style="display: inline;">
      <button type="submit" class="nav-icon" style="background: none; border: none; cursor: pointer;">
        <i class="bi bi-box-arrow-right"></i><span>Chiqish</span>
      </button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="dashboard-card">
    <h2><i class="bi bi-speedometer2"></i> Admin Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" th:text="${totalUsers}">0</div>
        <div class="stat-label">Jami foydalanuvchilar</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" th:text="${blockedUsers}">0</div>
        <div class="stat-label">Bloklangan foydalanuvchilar</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" th:text="${totalAds}">0</div>
        <div class="stat-label">Jami e’lonlar</div>
      </div>
    </div>
  </div>

  <div class="dashboard-card">
    <h3><i class="bi bi-gear"></i> Boshqaruv paneli</h3>
    <div class="admin-links">
      <a href="/admin/users" class="admin-link">
        <i class="bi bi-people"></i>
        <span>Foydalanuvchilar</span>
      </a>
      <a href="/admin/ads" class="admin-link">
        <i class="bi bi-list-ul"></i>
        <span>E’lonlar</span>
      </a>
    </div>
  </div>
</div>

<div class="footer">© 2025 Oldi-Berdi Admin panel</div>

</body>
</html>
