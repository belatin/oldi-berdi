<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <title>Foydalanuvchilar | Admin panel</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --p: #d1007a;
      --bg: #f8f9fa;
      --gray: #8e8e93;
      --text-dark: #1c1c1e;
      --border-light: #f0f0f2;
      --card-white: #ffffff;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); }
    .navbar {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      padding: 10px 8%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--p), #7b1fa2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-icons { display: flex; gap: 18px; align-items: center; }
    .nav-icon { text-decoration: none; color: var(--text-dark); display: flex; flex-direction: column; align-items: center; font-size: 13px; gap: 4px; background: none; border: none; cursor: pointer; }
    .nav-icon i { font-size: 22px; }
    .container { max-width: 1280px; margin: 32px auto; padding: 0 24px; }
    .card { background: var(--card-white); border-radius: 28px; border: 1px solid var(--border-light); padding: 28px; margin-bottom: 28px; }
    .card-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { background: var(--bg); font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-blocked { background: #fee2e2; color: #991b1b; }
    .btn-sm {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-block { background: #ef4444; color: white; }
    .btn-unblock { background: #10b981; color: white; }
    .btn-view { background: var(--bg); border: 1px solid var(--border-light); color: var(--text-dark); }
    .btn-sm:hover { opacity: 0.85; transform: translateY(-1px); }
    .empty-state { text-align: center; padding: 60px; color: var(--gray); }
    .footer { text-align: center; padding: 24px; border-top: 1px solid var(--border-light); margin-top: 40px; color: var(--gray); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="logo">Oldi<span>-Berdi</span> Admin</a>
  <div class="nav-icons">
    <a href="/ads" class="nav-icon"><i class="bi bi-house"></i><span>Saytga o‘tish</span></a>
    <form th:action="@{/auth/logout}" method="post" style="display: inline;">
      <button type="submit" class="nav-icon"><i class="bi bi-box-arrow-right"></i><span>Chiqish</span></button>
    </form>
  </div>
</nav>

<div class="container">
  <div class="card">
    <div class="card-title">
      <i class="bi bi-people-fill" style="color: var(--p);"></i> Foydalanuvchilar
      <a href="/admin" class="btn-sm btn-view" style="margin-left: auto;">⬅ Dashboard</a>
    </div>
    <table>
      <thead>
      <tr>
        <th>ID</th>
        <th>Foydalanuvchi nomi</th>
        <th>Telefon raqam</th>
        <th>Holat</th>
        <th>Ro‘yxatdan o‘tgan</th>
        <th>Amallar</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td>
          <a th:href="@{/admin/users/{id}(id=${user.id})}" th:text="${user.username != null ? user.username : 'Nomaʼlum'}" style="color: var(--p); text-decoration: none;"></a>
        </td>
        <td th:text="${user.phone}"></td>
        <td>
          <span th:if="${user.status == 'ACTIVE'}" class="badge badge-active">Faol</span>
          <span th:if="${user.status == 'BLOCKED'}" class="badge badge-blocked">Bloklangan</span>
        </td>
        <td th:text="${user.created_at}"></td>
        <td>
          <!-- Block tugmasi (faqat ACTIVE bo‘lsa) -->
          <form th:if="${user.status == 'ACTIVE'}" th:action="@{/admin/users/{id}/block(id=${user.id})}" method="post" style="display: inline;">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn-sm btn-block" onclick="return confirm('Foydalanuvchini bloklashni tasdiqlaysizmi?')">Bloklash</button>
          </form>
          <!-- Unblock tugmasi (faqat BLOCKED bo‘lsa) -->
          <form th:if="${user.status == 'BLOCKED'}" th:action="@{/admin/users/{id}/unblock(id=${user.id})}" method="post" style="display: inline;">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn-sm btn-unblock" onclick="return confirm('Blokni olib tashlashni tasdiqlaysizmi?')">Faollashtirish</button>
          </form>
          <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn-sm btn-view" style="margin-left: 8px;">Batafsil</a>
        </td>
      </tr>
      <tr th:if="${users.empty}">
        <td colspan="6" class="empty-state">Hech qanday foydalanuvchi topilmadi</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="footer">© 2025 Oldi-Berdi Admin panel</div>
</body>
</html>
