<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategoriya atributlari | Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --p: #d1007a; --bg: #f8f9fa; --gray: #8e8e93; --border-light: #f0f0f2; --card-white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        .navbar { background: rgba(255,255,255,0.82); backdrop-filter: blur(16px); padding: 10px 8%; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--p), #7b1fa2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-icons { display: flex; gap: 18px; align-items: center; }
        .nav-icon { text-decoration: none; color: #1c1c1e; display: flex; flex-direction: column; align-items: center; font-size: 13px; gap: 4px; background: none; border: none; cursor: pointer; }
        .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
        .card { background: var(--card-white); border-radius: 28px; border: 1px solid var(--border-light); padding: 28px; margin-bottom: 28px; }
        .card-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-bar { margin-bottom: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        select, .btn { padding: 10px 20px; border-radius: 40px; border: 1px solid var(--border-light); background: white; font-size: 14px; }
        .btn-primary { background: var(--p); color: white; border: none; cursor: pointer; }
        .btn-sm { padding: 6px 14px; border-radius: 30px; font-size: 13px; text-decoration: none; display: inline-block; background: var(--bg); border: 1px solid var(--border-light); cursor: pointer; }
        .btn-danger { background: #ef4444; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
        th { background: var(--bg); font-weight: 600; }
        .badge { background: #e0e7ff; color: #1e40af; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/admin" class="logo">Oldi-Berdi Admin</a>
    <div class="nav-icons">
        <a href="/ads" class="nav-icon"><i class="bi bi-house"></i><span>Saytga</span></a>
        <form th:action="@{/auth/logout}" method="post"><button class="nav-icon"><i class="bi bi-box-arrow-right"></i><span>Chiqish</span></button></form>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-title">
            <i class="bi bi-tags"></i> Kategoriya atributlari
            <a href="/admin" class="btn-sm" style="margin-left: auto;">⬅ Dashboard</a>
        </div>
        <div class="filter-bar">
            <form method="get" action="/admin/category-attributes" style="display: flex; gap: 10px;">
                <select name="categoryId" onchange="this.form.submit()">
                    <option value="">-- Kategoriyani tanlang --</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == selectedCategoryId}"></option>
                </select>
                <a th:if="${selectedCategoryId != null}" th:href="@{/admin/category-attributes/create(categoryId=${selectedCategoryId})}" class="btn-primary btn-sm">+ Yangi atribut</a>
            </form>
        </div>

        <div th:if="${selectedCategoryId == null}" class="empty-state" style="text-align:center; padding:40px;">Iltimos, kategoriyani tanlang</div>

        <div th:if="${selectedCategoryId != null}">
            <table th:if="${not #lists.isEmpty(attributes)}">
                <thead>
                <tr><th>Nomi</th><th>Tur</th><th>Majburiy</th><th>Variantlar</th><th>Amallar</th></tr>
                </thead>
                <tbody>
                <tr th:each="attr : ${attributes}">
                    <td th:text="${attr.name}">默</td>
                    <td><span class="badge" th:text="${attr.attributeType}"></span></td>
                    <td th:text="${attr.required} ? '✅ Ha' : '❌ Yo‘q'"></td>
                    <td><span th:each="opt : ${attr.options}" th:text="${opt} + '  '"></span></td>
                    <td>
                        <a th:href="@{/admin/category-attributes/edit/{id}(id=${attr.id})}" class="btn-sm">✏️ Tahrirlash</a>
                        <form th:action="@{/admin/category-attributes/delete/{id}(id=${attr.id})}" method="post" style="display:inline;" onsubmit="return confirm('Atributni o‘chirilsinmi?')">
                            <input type="hidden" name="categoryId" th:value="${selectedCategoryId}">
                            <button type="submit" class="btn-sm btn-danger">🗑️ O‘chirish</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(attributes)}" style="text-align:center; padding:40px;">Bu kategoriyada atributlar yo‘q</div>
        </div>
    </div>
</div>
</body>
</html>
