<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
  <meta charset="UTF-8">
  <title>E'lon yaratish | Oldi-Berdi</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>

    :root { --p: #d1007a; --s: #7b1fa2; --bg: #f8f9fa; --gray: #8e8e93; }
    body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; color: #1d1d1f; }

    .navbar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
      padding: 12px 8%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .logo { font-size: 26px; font-weight: 800; background: linear-gradient(45deg, var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }

    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .form-card { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }

    /* Image Management Section */
    .upload-section { margin-bottom: 40px; }
    .preview-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

    .preview-item {
      position: relative; width: 140px; height: 140px; border-radius: 20px;
      background: #fbfbfd; border: 2px solid #f2f2f7; transition: 0.3s;
      cursor: grab; overflow: visible;
    }
    .preview-item.drag-over { border: 2px dashed var(--p); transform: scale(1.05); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }

    /* Control Buttons */
    .btn-img-ctrl {
      position: absolute; width: 28px; height: 28px; border-radius: 50%;
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-delete { top: -8px; right: -8px; background: #ff3b30; color: white; }
    .btn-make-main { top: -8px; left: -8px; background: white; color: var(--gray); }
    .main-badge {
      position: absolute; top: -8px; left: -8px; background: var(--p); color: white;
      padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800;
      text-transform: uppercase; z-index: 11; border: 2px solid white;
    }

    .upload-placeholder {
      width: 140px; height: 140px; border: 2px dashed #d2d2d7; border-radius: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gray); transition: 0.3s;
    }
    .upload-placeholder:hover { border-color: var(--p); background: #fdf2f8; color: var(--p); }

    /* Form Inputs */
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px; }
    .input-style {
      width: 100%; padding: 15px; border-radius: 16px; border: 2px solid #f2f2f7;
      background: #fbfbfd; font-size: 16px; transition: 0.3s; box-sizing: border-box;
    }
    .input-style:focus { border-color: var(--p); outline: none; background: white; }

    .btn-submit {
      background: var(--p); color: white; border: none; width: 100%;
      padding: 18px; border-radius: 20px; font-size: 18px; font-weight: 700;
      cursor: pointer; margin-top: 20px;
    }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/ads" class="logo">Oldi<span>-Berdi</span></a>
</nav>

<div class="container">
  <div class="form-card">
    <h1>Yangi e'lon yaratish</h1>

    <form id="adForm" th:action="@{/ads/create}" th:object="${adCreateDto}" method="post" enctype="multipart/form-data">

      <div class="upload-section">
        <label style="display: block; font-weight: 600; margin-bottom: 15px;">Rasmlar</label>
        <div class="preview-list" id="previewList">
          <label class="upload-placeholder" id="uploadBtn">
            <input type="file" id="fileInput" name="images" accept="image/*" multiple style="display: none;">
            <i class="bi bi-camera-fill" style="font-size: 24px;"></i>
            <span style="font-size: 12px; margin-top: 5px;">Rasm qo'shish</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>E'lon sarlavhasi</label>
        <input type="text" name="title" class="input-style" placeholder="Masalan: iPhone 12 Pro" required>
      </div>

      <div style="display: flex; gap: 20px;">
        <div class="form-group" style="flex: 1;">
          <label>Kategoriya</label>
          <select name="categoryId" class="input-style" required>
            <option value="" disabled selected>Tanlang</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
          </select>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>Hudud</label>
          <select name="locationId" class="input-style" required>
            <option value="" disabled selected>Shahar tanlang</option>
            <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
          </select>
        </div>
      </div>

      <div id="attributesContainer"></div>

      <div class="form-group">
        <label>Narxi (so'm)</label>
        <input type="number" name="price" class="input-style" placeholder="0" required>
      </div>

      <div class="form-group">
        <label>Tavsif</label>
        <textarea name="description" class="input-style" style="height: 120px;" placeholder="Mahsulot haqida batafsil..."></textarea>
      </div>

      <input type="hidden" name="mainImageIndex" value="0">

      <button type="submit" class="btn-submit">E'lonni saqlash</button>
    </form>
  </div>
</div>

<script>
  let selectedFiles = [];

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const newFiles = Array.from(e.target.files);
    selectedFiles = [...selectedFiles, ...newFiles];
    renderPreviews();
    this.value = '';
  });

  async function renderPreviews() {
    const previewList = document.getElementById('previewList');
    // Upload tugmasini saqlab qolish uchun uni oxirida qayta qo'shamiz
    const uploadBtn = document.getElementById('uploadBtn');
    previewList.innerHTML = '';

    for (let index = 0; index < selectedFiles.length; index++) {
      const file = selectedFiles[index];
      const imageData = await readFileAsDataURL(file);

      const wrapper = document.createElement('div');
      wrapper.className = 'preview-item';
      wrapper.setAttribute('draggable', index !== 0); // Main rasmni sudrab bo'lmaydi
      wrapper.dataset.index = index;

      if (index !== 0) {
        wrapper.addEventListener('dragstart', handleDragStart);
        wrapper.addEventListener('dragover', handleDragOver);
        wrapper.addEventListener('dragleave', handleDragLeave);
        wrapper.addEventListener('drop', handleDrop);
        wrapper.addEventListener('dragend', handleDragEnd);
      }

      const isMain = index === 0;

      const badgeOrBtn = isMain ?
              '<span class="main-badge">Asosiy</span>' :
              `<button type="button" onclick="makeMain(${index})" class="btn-img-ctrl btn-make-main" title="Asosiy qilish"><i class="bi bi-star"></i></button>`;

      wrapper.innerHTML = `
            ${badgeOrBtn}
            <img src="${imageData}">
            <button type="button" onclick="removeImage(${index})" class="btn-img-ctrl btn-delete">&times;</button>
        `;
      previewList.appendChild(wrapper);
    }
    previewList.appendChild(uploadBtn); // Tugmani har doim oxirida saqlaymiz
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  function makeMain(index) {
    const element = selectedFiles.splice(index, 1)[0];
    selectedFiles.unshift(element);
    renderPreviews();
  }

  function removeImage(index) {
    selectedFiles.splice(index, 1);
    renderPreviews();
  }

  // DRAG & DROP LOGIC
  let draggedItemIndex = null;

  function handleDragStart(e) {
    draggedItemIndex = parseInt(this.dataset.index);
    e.dataTransfer.effectAllowed = 'move';
    this.style.opacity = '0.4';
  }

  function handleDragOver(e) {
    e.preventDefault();
    const targetIndex = parseInt(this.dataset.index);
    if (targetIndex !== 0) { // Main rasm ustiga olib kelib bo'lmaydi
      this.classList.add('drag-over');
    }
  }

  function handleDragLeave() {
    this.classList.remove('drag-over');
  }

  function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    const targetIndex = parseInt(this.dataset.index);

    if (targetIndex === 0 || draggedItemIndex === null) return;

    if (draggedItemIndex !== targetIndex) {
      const itemToMove = selectedFiles.splice(draggedItemIndex, 1)[0];
      selectedFiles.splice(targetIndex, 0, itemToMove);
      renderPreviews();
    }
  }

  function handleDragEnd() {
    this.style.opacity = '1';
    draggedItemIndex = null;
  }

  document.getElementById('adForm').addEventListener('submit', function(e) {
    if (selectedFiles.length === 0) {
      alert("Kamida bitta rasm yuklang!");
      e.preventDefault();
      return;
    }
    const dataTransfer = new DataTransfer();
    selectedFiles.forEach(file => dataTransfer.items.add(file));
    document.getElementById('fileInput').files = dataTransfer.files;
  })

  document.querySelector('select[name="categoryId"]').addEventListener('change', function() {
    const categoryId = this.value;
    if (!categoryId) return;

    fetch(`/ads/attributes?categoryId=${categoryId}`)
            .then(res => res.json())
            .then(attributes => renderAttributes(attributes));
  });

  function renderAttributes(attributes) {
    const container = document.getElementById('attributesContainer');
    container.innerHTML = '';

    if (attributes.length === 0) return;

    const title = document.createElement('h3');
    title.textContent = 'Xususiyatlar';
    title.style.cssText = 'font-size:16px; font-weight:600; margin-bottom:15px;';
    container.appendChild(title);

    attributes.forEach(attr => {
      const group = document.createElement('div');
      group.className = 'form-group';

      const label = document.createElement('label');
      label.textContent = attr.name + (attr.required ? ' *' : '');
      group.appendChild(label);

      let input;

      if (attr.attributeType === 'SELECT') {
        input = document.createElement('select');
        input.className = 'input-style';
        input.name = `attributeValues[${attr.id}]`;
        if (!attr.required) {
          const empty = document.createElement('option');
          empty.value = '';
          empty.textContent = 'Tanlang';
          input.appendChild(empty);
        }
        attr.options.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          input.appendChild(option);
        });
      } else if (attr.attributeType === 'NUMBER') {
        input = document.createElement('input');
        input.type = 'number';
        input.className = 'input-style';
        input.name = `attributeValues[${attr.id}]`;
      } else {
        input = document.createElement('input');
        input.type = 'text';
        input.className = 'input-style';
        input.name = `attributeValues[${attr.id}]`;
      }

      if (attr.required) input.required = true;
      group.appendChild(input);
      container.appendChild(group);
    });
  };
</script>

</body>
</html>
